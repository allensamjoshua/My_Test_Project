<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact EduLearn</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="navbar">
    <h1>Contact Support</h1>
</header>

<main class="container">

    <section>
        <details>
            <summary><strong>How do I enroll?</strong></summary>
            <p>Click the <b>Enroll</b> button on any course page to get started.</p>
        </details>
    </section>

    <form onsubmit="event.preventDefault(); showMessage();">
        
        <label for="name">Name</label>
        <input id="name" name="name" required placeholder="Enter your name">

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required placeholder="Enter your email">

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4" required placeholder="Type your message here..."></textarea>

        <button class="btn-primary">Send Message</button>

        <p id="successMsg" style="display:none; color:green;">Message sent successfully!</p>
    </form>

</main>

<footer>
    <p style="text-align:center;">© 2026 EduLearn Support</p>
</footer>

<script>
function showMessage() {
    document.getElementById("successMsg").style.display = "block";
}
</script>

</body>
</html>
