<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact EduLearn</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="navbar">
    <h1>Contact Support</h1>
</header>

<main class="container">

    <section>
        <details>
            <summary><strong>How do I enroll?</strong></summary>
            <p>Click the <b>Enroll</b> button on any course page to get started.</p>
        </details>
    </section>

    <form onsubmit="event.preventDefault(); alert('Message sent successfully!');">
        
        <label>Name</label>
        <input required placeholder="Enter your name">

        <label>Email</label>
        <input required type="email" placeholder="Enter your email">

        <label>Message</label>
        <textarea required placeholder="Type your message here..."></textarea>

        <button class="btn-primary">Send Message</button>
    </form>

</main>

<footer>
    <p style="text-align:center;">© 2026 EduLearn Support</p>
</footer>

</body>
</html>
