<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact EduLearn</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        .form-box {
            max-width: 500px;
            margin: 20px auto;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        input:focus, textarea:focus {
            border-color: #4CAF50;
            outline: none;
        }

        .btn-primary {
            width: 100%;
            padding: 10px;
            cursor: pointer;
        }

        #successMsg {
            text-align: center;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #successMsg.show {
            opacity: 1;
        }
    </style>
</head>
<body>

<header class="navbar">
    <h1>Contact Support</h1>
</header>

<main class="container">

    <section>
        <details>
            <summary><strong>How do I enroll?</strong></summary>
            <p>Click the <b>Enroll</b> button on any course page to get started.</p>
        </details>
    </section>

    <form id="contactForm" class="form-box" novalidate>
        
        <label for="name">Name</label>
        <input id="name" name="name" required placeholder="Enter your name" autocomplete="name">

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required placeholder="Enter your email" autocomplete="email">

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4" required placeholder="Type your message here..."></textarea>

        <button type="submit" id="submitBtn" class="btn-primary">Send Message</button>

        <p id="successMsg">✅ Message sent successfully!</p>
    </form>

</main>

<footer>
    <p style="text-align:center;">© 2026 EduLearn Support</p>
</footer>

<script>
const form = document.getElementById("contactForm");
const msg = document.getElementById("successMsg");
const btn = document.getElementById("submitBtn");

form.addEventListener("submit", function(e) {
    e.preventDefault();

    // Simple validation
    if (!form.checkValidity()) {
        form.reportValidity();
        return;
    }

    // Disable button while "sending"
    btn.disabled = true;
    btn.textContent = "Sending...";

    setTimeout(() => {
        msg.classList.add("show");
        form.reset();

        btn.disabled = false;
        btn.textContent = "Send Message";

        setTimeout(() => {
            msg.classList.remove("show");
        }, 3000);

    }, 800); // simulate API delay
});
</script>

</body>
</html>
