<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduLearn | Course</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #ffffff;
            color: #000;
        }

        body.dark {
            background: #121212;
            color: #eee;
        }

        .navbar {
            padding: 10px 20px;
            border-bottom: 1px solid #ccc;
            display: flex;
            justify-content: space-between;
        }

        main {
            max-width: 800px;
            margin: auto;
        }

        .course-header {
            text-align: center;
            padding: 20px;
        }

        .course-header img {
            width: 100%;
            border-radius: 6px;
        }

        .info {
            margin-top: 10px;
            font-size: 14px;
            color: gray;
        }

        .btn {
            margin: 8px;
            padding: 8px 16px;
            border: none;
            background: #1976d2;
            color: white;
            cursor: pointer;
            border-radius: 4px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .tab {
            padding: 8px 14px;
            margin: 0 5px;
            border: none;
            background: #ddd;
            cursor: pointer;
        }

        .tab.active {
            background: #1976d2;
            color: white;
        }

        .tab-panel {
            display: none;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 6px;
        }

        body.dark .tab-panel {
            background: #1e1e1e;
        }

        .tab-panel.active {
            display: block;
        }
    </style>
</head>

<body>

<header class="navbar">
    <a href="courses.html">← Courses</a>
    <button class="btn" onclick="toggleTheme()">Toggle Theme</button>
</header>

<main>

<section class="course-header">
    <img src="https://via.placeholder.com/800x300" alt="banner">

    <h1>Python Automation Mastery</h1>
    <p>Automate real-world tasks using Python.</p>

    <!-- NEW INFO STRUCTURE -->
    <div class="info">
        Duration: 6 Weeks · Level: Intermediate
    </div>

    <!-- NEW BUTTON -->
    <button class="btn">Preview Course</button>
    <button id="enrollBtn" class="btn" onclick="enroll()">Enroll</button>
</section>

<section class="tabs">
    <button class="tab active" onclick="openTab(event,'overview')">Overview</button>
    <button class="tab" onclick="openTab(event,'syllabus')">Syllabus</button>
</section>

<div id="overview" class="tab-panel active">
    <p>Learn automation using Python, Selenium, APIs, and scripting.</p>
</div>

<div id="syllabus" class="tab-panel">
    <ul>
        <!-- UPDATED CONTENT -->
        <li>Automation Basics</li>
        <li>Selenium & Web Scraping</li>
        <li>Task Scheduling</li>
        <li>Final Automation Project</li>
    </ul>
</div>

</main>

<script>
function openTab(e, id) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

    document.getElementById(id).classList.add('active');
    e.target.classList.add('active');
}

function enroll() {
    const btn = document.getElementById("enrollBtn");
    btn.innerText = "Enrolled";
    btn.disabled = true;
}

// NEW FEATURE
function toggleTheme() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
